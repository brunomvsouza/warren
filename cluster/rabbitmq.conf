# RabbitMQ configuration shared by all three nodes of the warren cluster lane
# (docker-compose.cluster.yml). The file is identical on every node because the
# classic_config peer-discovery list below is the same set of nodes regardless of
# which node reads it.

# --- Cluster formation -------------------------------------------------------
# classic_config peer discovery: each node is told the full member list up front,
# so the three containers form a single cluster on first boot without needing the
# rabbitmqctl join_cluster dance. Node names are rabbit@<hostname>; the compose
# file pins each container's hostname to rmq0/rmq1/rmq2.
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rmq0
cluster_formation.classic_config.nodes.2 = rabbit@rmq1
cluster_formation.classic_config.nodes.3 = rabbit@rmq2

# --- Partition handling ------------------------------------------------------
# pause_minority is the strategy the partition-under-load campaign (T166g) asserts:
# when Toxiproxy severs a node, the minority side pauses (stops serving) while the
# majority keeps a quorum and surfaces classifiable errors instead of silently
# stalling. RabbitMQ's partition strategies are mutually exclusive, so autoheal
# (which would auto-restart the minority and mask the pause the campaign verifies)
# is intentionally NOT set here; pause_minority is the one the cluster claims rest on.
cluster_partition_handling = pause_minority

# --- Quorum queues by default -----------------------------------------------
# The cluster campaigns stream to quorum queues (Raft-replicated across the three
# members) so leader failover is observable. Defaulting the queue type to quorum
# means a plain queue.declare in the smoke test already lands a replicated queue.
default_queue_type = quorum

# Allow the default guest user over the (non-loopback) container network so the
# smoke test can authenticate from the host through Toxiproxy.
loopback_users = none
