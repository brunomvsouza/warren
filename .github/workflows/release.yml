name: Release

# Pure library: no goreleaser, no binary artifacts (Op decision §5). A tag push
# matching v*.*.* creates a GitHub release with notes auto-generated from the
# merged PRs / commits since the previous tag.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # required to create the release

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so release-note generation sees prior tags

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
