name: Cluster reliability lane

# The `cluster` build-tag campaigns (Phase 9.5 / T166) — quorum leader failover, SAC
# failover on real node death, WithAddrs no-stampede, quorum confirm-latency,
# reconnect-storm, partition-under-load, and rolling-restart-under-load — run against a
# real 3-node quorum cluster + per-node Toxiproxy stood up by docker-compose.cluster.yml.
#
# NOT a required per-PR gate (SPEC §10 Rev 23 D5): the lane is heavy (node kills, Raft
# re-elections, ~minute-scale partition detection) and on-demand/nightly by nature — so
# it triggers on a nightly schedule and manual dispatch only, never on push/pull_request.
# The single-node `integration` lane stays the per-PR gate.
#
# The same campaigns run over a HOMOGENEOUS RabbitMQ version matrix — the 3.13 LTS most
# estates run and the 4.x line (quorum/Khepri behaviour the campaigns assert) — the
# cluster-lane analogue of T151/TV-05's single-node integration matrix. This is a
# standalone workflow (mirroring bench.yml's schedule + dispatch shape) until T151's
# general nightly workflow lands and consolidates it.
on:
  schedule:
    - cron: "0 5 * * *" # nightly, after the 04:00 bench drift report
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cluster:
    name: Cluster campaigns (RabbitMQ ${{ matrix.label }})
    runs-on: ubuntu-latest
    # Outer hard bound for a wedged run. test-cluster's own `go test -timeout=60m` is the
    # inner bound and fires first with a goroutine dump; this caps the whole job (cluster
    # bring-up + the 60m test budget + teardown) so a true hang can't sit on a runner for
    # the 6h Actions default. Generous on purpose — the lane is nightly, not a PR gate.
    timeout-minutes: 70
    strategy:
      # Independent versions: a 3.13 failure must not cancel the 4.x run or vice versa.
      fail-fast: false
      matrix:
        include:
          # Pinned patches for reproducibility. `image` feeds WARREN_RMQ_IMAGE (all three
          # nodes homogeneous); `label` is a filesystem-safe tag for artifact/job names
          # (the image string has ':' and is not a valid artifact name).
          - { image: "rabbitmq:3.13.7-management", label: "3.13.7" }
          - { image: "rabbitmq:4.0.9-management", label: "4.0.9" }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # Stand up the 3-node quorum cluster + Toxiproxy on the matrix image (every node
      # homogeneous via WARREN_RMQ_IMAGE). --wait blocks until every node is healthy.
      - name: Start cluster (RabbitMQ ${{ matrix.label }})
        run: WARREN_RMQ_IMAGE=${{ matrix.image }} make cluster-up

      # Run the cluster campaigns. test-cluster carries its own zero-run guard (fails if
      # no *_cluster test executed) and -count=1 (the live cluster is external state Go's
      # test cache cannot see), and points WARREN_CLUSTER_*/TOXIPROXY at the compose cluster.
      - name: Run cluster campaigns (race) + zero-run guard
        run: make test-cluster

      # The summary distils cluster.log down to the per-campaign verdicts, the package
      # line, and the zero-run-guard count (test-cluster tees "cluster tests executed: N"
      # into cluster.log so it surfaces here, not just in the step log). GitHub runs this
      # step under `bash -eo pipefail`: a no-match grep exits 1, pipefail promotes that to
      # the pipeline status, and set -e would then abort the assignment before the
      # `${summary:-…}` fallback runs — so `|| true` neutralizes the grep exit status, while
      # the missing-file case is handled by the explicit `-f` guard. (The old
      # `grep | tail || echo` was doubly broken: the `||` keyed off tail's success, so it
      # never fired at all.)
      - name: Publish cluster log to job summary
        if: always()
        run: |
          {
            echo "## Cluster campaigns — RabbitMQ ${{ matrix.label }}"
            echo '```'
            if [ -f cluster.log ]; then
              summary=$(grep -E '^(--- (PASS|FAIL):|ok |FAIL\b|cluster tests executed:)' cluster.log | tail -80) || true
              echo "${summary:-(cluster.log produced no PASS/FAIL/summary lines)}"
            else
              echo '(no cluster.log produced)'
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cluster log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cluster-log-${{ matrix.label }}
          path: cluster.log
          if-no-files-found: warn

      - name: Stop cluster
        if: always()
        run: make cluster-down
