name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs get a read-only GITHUB_TOKEN regardless of the
# repo/org default token scope. The one job that needs to write (the coverage
# PR comment) widens it locally. Mirrors release.yml and bench.yml.
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod declares `go 1.25.0`, so 1.25 is the minimum buildable toolchain;
        # the plan's 1.23/1.24 row predates that bump. Add newer majors here as
        # they ship to keep the -race matrix honest (Lens-10 TV-07).
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: make build

      - name: Examples build
        run: make examples-build

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12

      - name: Test (unit, race)
        run: make test

      - name: Test (stress, determinism guard)
        run: make test-stress

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # Enforced, not reported: scripts/coverage.sh fails the job when any package
      # is below 80% or a critical-path package/file is below 95% (SPEC §9 / Rev 7,
      # Lens-10 TV-03). The per-package table is captured for the PR comment.
      - name: Coverage gate (per-package >=80%, critical-path >=95%)
        run: |
          set -o pipefail
          ./scripts/coverage.sh coverage.out 2>&1 | tee coverage-summary.txt

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

      # Same-repo PRs only: on fork PRs the GITHUB_TOKEN is read-only regardless of
      # the permissions: block (GitHub's documented behavior for pull_request from
      # forks), so issues.createComment would 403 and fail the whole coverage job.
      # The gate step above still runs and enforces on every PR; only the cosmetic
      # comment is skipped for forks.
      - name: Comment coverage summary on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            let summary = 'coverage-summary.txt was not produced';
            try { summary = fs.readFileSync('coverage-summary.txt', 'utf8'); } catch (e) {}
            const marker = '<!-- coverage-gate -->';
            const body = `${marker}\n## Coverage gate\n\n\`\`\`\n${summary.trim()}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      AMQP_TEST_URL: amqp://guest:guest@localhost:5672/
      AMQP_TEST_MANAGEMENT_URL: http://guest:guest@localhost:15672
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # Build + start the plugin-enabled broker (rabbitmq:3.13-management +
      # rabbitmq_delayed_message_exchange) and wait until healthy. Reusing the same
      # test/docker-compose.integration.yml as local dev keeps the CI broker identical to
      # `make integration-up`, and -- unlike the services: shorthand, which can only
      # pull a pre-built registry image -- bakes in the delayed-message plugin so the
      # delayed-delivery timing assertion actually runs instead of skipping.
      - name: Start RabbitMQ (delayed-plugin broker)
        run: make integration-up

      # Mirrors `make test-integration` but with -v + a zero-run guard: if no
      # integration test (a Test*_integration function) actually executed, the
      # broker-required lane asserted nothing and the job must FAIL rather than
      # pass green (Lens-10 TV-13). The integration tests themselves t.Fatal when
      # AMQP_TEST_URL is unset, so this guards the regression where a test starts
      # to t.Skip instead.
      - name: Integration tests (race) + zero-run guard
        run: |
          set -o pipefail
          go test -race -v -tags=integration ./... 2>&1 | tee integration.log
          ran=$(grep -cE '^[[:space:]]*--- (PASS|FAIL): Test[A-Za-z0-9_/]*_integration' integration.log) || true
          echo "integration tests executed: ${ran}"
          if [ "${ran:-0}" -eq 0 ]; then
            echo "::error::TV-13 guard: zero integration tests executed against the broker."
            exit 1
          fi

      # Real-broker-only conformance lane (T44 / TV-06): runs against the same
      # broker, with a zero-run guard mirroring the integration one — the
      # conformance tests t.Fatal when AMQP_TEST_URL is unset, so a zero count
      # means they silently stopped executing, which must fail rather than pass.
      - name: Conformance tests (race) + zero-run guard
        run: |
          set -o pipefail
          go test -race -v -tags=conformance ./conformance/... 2>&1 | tee conformance.log
          ran=$(grep -cE '^[[:space:]]*--- (PASS|FAIL): TestConformance' conformance.log) || true
          echo "conformance tests executed: ${ran}"
          if [ "${ran:-0}" -eq 0 ]; then
            echo "::error::zero conformance tests executed against the broker."
            exit 1
          fi

      - name: Examples smoke-run (race)
        run: make examples-smoke

      - name: Stop RabbitMQ
        if: always()
        run: make integration-down

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # govulncheck's default symbol scan fails the job only on a vulnerability
      # warren's code actually calls; an uncalled/transitive advisory is reported
      # but does not break the build. Pinned tool version lives in the Makefile.
      - name: govulncheck (dependency CVE gate)
        run: make vuln
