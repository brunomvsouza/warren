name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Build
        run: make build

      - name: Examples build
        run: make examples-build

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Test (unit, race)
        run: make test

      - name: Test (stress, determinism guard)
        run: make test-stress

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AMQP_TEST_URL: amqp://guest:guest@localhost:5672/
      AMQP_TEST_MANAGEMENT_URL: http://guest:guest@localhost:15672
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Integration tests (race)
        run: make test-integration

      - name: Examples smoke-run (race)
        run: make examples-smoke
