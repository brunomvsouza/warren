version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - gocritic
    - unparam
    - bodyclose
    - nilerr
    - errorlint
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes:
        - G115 # integer overflow conversion — many AMQP frame sizes are uint16/uint8 by spec
        - G101 # test fixtures in *_test.go deliberately contain fake AMQP credentials
        - G118 # context.WithCancel cancel stored on struct and called by Close — false positive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/brunomvsouza/amqp
